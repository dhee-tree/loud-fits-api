services:
  db:
    image: postgres:17-alpine
    container_name: ${DB_CONTAINER_NAME:-loud_fits_db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-loud_fits}
      POSTGRES_USER: ${DB_USER:-loud_fits_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loud_fits_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loud_fits_user} -d ${DB_NAME:-loud_fits}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ${API_CONTAINER_NAME:-loud_fits_api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${DB_NAME:-loud_fits}
      DATABASE_USER: ${DB_USER:-loud_fits_user}
      DATABASE_PASSWORD: ${DB_PASSWORD:-loud_fits_pass}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
