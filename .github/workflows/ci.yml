name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: loud_fits
          POSTGRES_USER: loud_fits_user
          POSTGRES_PASSWORD: loud_fits_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loud_fits_user -d loud_fits"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: loud_fits
      DATABASE_USER: loud_fits_user
      DATABASE_PASSWORD: loud_fits_pass
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

  audit:
    name: Run Audit Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git pull origin main
            docker compose down
            docker compose build api
            docker compose up -d
